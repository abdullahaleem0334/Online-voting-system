services:
  backend:
    build: .
    container_name: voting-backend
    restart: always
    ports:
      - "5000:5000"
    env_file:
      - .env

  frontend:
    image: nginx:alpine
    container_name: voting-frontend
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./frontend:/usr/share/nginx/html
